[build-system]
requires = ["setuptools>=61.0", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "phytrade"
version = "1.2.6"
description = "Institutional physics trade physics library for global commodity arbitration (50 Domains)."
readme = "README.md"
authors = [{name = "Kazi Saad Asif"}]
license = {text = "Proprietary"}
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
]
dependencies = [
    "numpy>=1.20.0",
]
requires-python = ">=3.8"

[tool.setuptools.packages.find]
where = ["src"]

[project.urls]
Homepage = "https://github.com"
