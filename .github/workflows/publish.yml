name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  build-n-publish:
    name: Build and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # CRITICAL: Allows setuptools-scm to see your tags

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install Build Tools
        run: |
          python -m pip install --upgrade pip
          # Explicitly installing the missing dependency here
          python -m pip install setuptools>=64.0 wheel build setuptools-scm>=8.0

      - name: Build Package
        # --no-isolation uses the tools we just installed above
        run: python -m build --no-isolation

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.12.4
        with:
          packages-dir: dist/
