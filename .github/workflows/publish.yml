name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  build-n-publish:
    name: Build and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Build Tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install setuptools>=64.0 wheel build

      - name: Build Package
        # Since your pyproject.toml is in the root, we target '.' directly.
        # --no-isolation ensures it uses the tools we just installed.
        run: python -m build --no-isolation .

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.12.4
        with:
          # By default, 'build' puts everything in a folder named 'dist'
          packages-dir: dist/
