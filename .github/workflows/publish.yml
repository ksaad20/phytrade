name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  build-n-publish:
    name: Build and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Build Tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install setuptools wheel build

      - name: Build and Publish
        run: |
          # Locate the manifest
          MANIFEST=$(find . -name "pyproject.toml" | head -n 1)
          if [ -z "$MANIFEST" ]; then
            echo "ERROR: pyproject.toml is MISSING from the repo."
            exit 1
          fi
          
          # Move to the directory containing pyproject.toml
          cd $(dirname "$MANIFEST")
          
          # Build using the tools we just installed
          python -m build
          
          # Prepare the distribution folder
          mkdir -p ${{ github.workspace }}/dist-final
          cp dist/* ${{ github.workspace }}/dist-final/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.12.4
        with:
          packages-dir: ${{ github.workspace }}/dist-final/
