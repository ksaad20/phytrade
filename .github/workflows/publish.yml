name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  build-n-publish:
    name: Build and publish Python distributions to PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Diagnostic Scout
        run: |
          echo "--- LISTING ALL FILES IN REPO ---"
          find . -maxdepth 3 -not -path '*/.*'
          echo "--- SEARCHING FOR TOML FILES ---"
          find . -name "*.toml"
          
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.12.4
        with:
          # This tells the publisher where the files were built
          packages-dir: ${{ github.workspace }}/phytrade/dist/
          # If that fails, it will try the root dist folder automatically
