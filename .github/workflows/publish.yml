name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  build-n-publish:
    name: Build and publish Python distributions to PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip build

      - name: Build
        # If your project is in the 'phytrade' folder, we build there
        run: |
          if [ -d "phytrade" ]; then
            cd phytrade
            python -m build
          else
            python -m build
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.12.4
        with:
          # This line is the key: it finds the dist folder wherever it was created
          packages-dir: ${{ github.workspace }}/**/dist/
