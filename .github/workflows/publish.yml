name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  build-n-publish:
    name: Build and publish Python distributions to PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip build

      - name: Locate and Build
        run: |
          # 1. Find the folder containing pyproject.toml
          PROJECT_ROOT=$(find . -name "pyproject.toml" -printf '%h\n' | head -n 1)
          echo "Found project manifest in: $PROJECT_ROOT"
          
          # 2. Go to that folder and build
          cd "$PROJECT_ROOT"
          python -m build .
          
          # 3. Move the results to a predictable spot for the publisher
          mkdir -p ${{ github.workspace }}/dist-final
          cp dist/* ${{ github.workspace }}/dist-final/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.12.4
        with:
          packages-dir: ${{ github.workspace }}/dist-final/
