name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  build-n-publish:
    name: Build and publish Python distributions to PyPI
    runs-on: ubuntu-latest
    
    # REQUIRED: This gives the worker the keys to your Private Vault
    permissions:
      contents: read
      id-token: write

    # FORCED PATHING: Tells the worker exactly where the project lives
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build binary wheel and source tarball
        # The "." ensures it finds pyproject.toml in the current folder
        run: python -m build .

      - name: Publish to PyPI
        # Pinned to v1.12.4 to avoid "Unable to resolve version" errors
        uses: pypa/gh-action-pypi-publish@v1.12.4
