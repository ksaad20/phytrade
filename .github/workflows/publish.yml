name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  build-n-publish:
    name: Build and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Pull everything

      - name: Show me the goods
        run: |
          echo "--- WHERE AM I? ---"
          pwd
          echo "--- WHAT FILES ARE HERE? ---"
          ls -R
          echo "--- SEARCHING FOR ANY TOML ---"
          find . -name "*.toml"

      - name: Build and Publish
        run: |
          # Only run if we actually find the file
          MANIFEST=$(find . -name "pyproject.toml" | head -n 1)
          if [ -z "$MANIFEST" ]; then
            echo "ERROR: pyproject.toml is MISSING from the repo."
            exit 1
          fi
          cd $(dirname "$MANIFEST")
          python -m pip install build
          python -m build .
          mkdir -p ${{ github.workspace }}/dist-final
          cp dist/* ${{ github.workspace }}/dist-final/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.12.4
        with:
          packages-dir: ${{ github.workspace }}/dist-final/
